services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buildflow-relay
    ports:
      - "3053:3053"
    env_file:
      # PRODUCTION: export RELAY_ENV_FILE=~/.config/buildflow/.env.relay && docker compose up -d
      # DEV ONLY: docker compose up -d (uses committed template with no real secrets)
      - ${RELAY_ENV_FILE:-packages/bridge/.env.relay}
    environment:
      BRIDGE_PORT: 3053
      RELAY_DATA_DIR: /var/lib/buildflow
      NODE_ENV: production
      # Phase 5C: Relay proxy token for authenticated relay-agent requests
      # Generate with: openssl rand -hex 32
      # For dev/testing, set a test value; for production, use a strong secret
      RELAY_PROXY_TOKEN: ${RELAY_PROXY_TOKEN:-dev-proxy-token}
    volumes:
      # Persist state across container restarts
      - buildflow-data:/var/lib/buildflow
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:3053/ready', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  buildflow-data:
    driver: local
